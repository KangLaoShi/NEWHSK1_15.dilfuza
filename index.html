<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 1 NEW3.0 - Lesson 15</title>
    <!-- 使用稳定的 CDN 源，避免解析错误和网络加载问题 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.25), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(30, 58, 138, 0.25), transparent 25%);
            background-attachment: fixed;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .flip-card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1); 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2); 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3); 
        }
    </style>
</head>
<body>
    <!-- 添加加载提示，避免初始黑屏 -->
    <div id="root">
        <div style="text-align: center; margin-top: 20vh; color: #818cf8; font-size: 1.5rem; font-family: sans-serif;">
            Yuklanmoqda... / 加载中，请稍候...
        </div>
    </div>

    <!-- 恢复标准的 text/babel，去除导致模块冲突的属性 -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DATA ---
        const vocabList = [
            { id: 1, hanzi: "爱", pinyin: "ài", uzb: "yaxshi ko'rmoq", rus: "любить", eng: "like; be fond of" },
            { id: 2, hanzi: "哪个", pinyin: "nǎge", uzb: "qaysi", rus: "который", eng: "which" },
            { id: 3, hanzi: "去年", pinyin: "qùnián", uzb: "o'tgan yili", rus: "прошлый год", eng: "last year" },
            { id: 4, hanzi: "男朋友", pinyin: "nánpéngyou", uzb: "yigit (do'st)", rus: "парень", eng: "boyfriend" },
            { id: 5, hanzi: "几", pinyin: "jǐ", uzb: "bir necha", rus: "несколько", eng: "a few; several" },
            { id: 6, hanzi: "年", pinyin: "nián", uzb: "yil", rus: "год", eng: "year" },
            { id: 7, hanzi: "好玩儿", pinyin: "hǎowánr", uzb: "qiziqarli", rus: "интересный", eng: "fun; interesting" },
            { id: 8, hanzi: "飞机", pinyin: "fēijī", uzb: "samolyot", rus: "самолет", eng: "plane" },
            { id: 9, hanzi: "要", pinyin: "yào", uzb: "kerak, oladi (vaqt)", rus: "нужно, занимает", eng: "need; take" },
            { id: 10, hanzi: "小时", pinyin: "xiǎoshí", uzb: "soat", rus: "час", eng: "hour" },
            { id: 11, hanzi: "家人", pinyin: "jiārén", uzb: "oila a'zosi", rus: "член семьи", eng: "family (member)" },
            { id: 12, hanzi: "时间", pinyin: "shíjiān", uzb: "vaqt", rus: "время", eng: "time" },
            { id: 13, hanzi: "机场", pinyin: "jīchǎng", uzb: "aeroport", rus: "аэропорт", eng: "airport" },
            { id: 14, hanzi: "接", pinyin: "jiē", uzb: "kutib olmoq", rus: "встречать", eng: "meet; welcome" },
            { id: 15, hanzi: "住", pinyin: "zhù", uzb: "yashamoq, turmoq", rus: "жить", eng: "live; stay" },
            { id: 16, hanzi: "早", pinyin: "zǎo", uzb: "erta", rus: "рано", eng: "early" },
            { id: 17, hanzi: "那", pinyin: "nà", uzb: "unda, u holda", rus: "тогда", eng: "then" }
        ];

        const generateVocabOptions = (correct) => {
            let options = new Set([correct.uzb]);
            while(options.size < 4) {
                const randomItem = vocabList[Math.floor(Math.random() * vocabList.length)].uzb;
                options.add(randomItem);
            }
            return Array.from(options).sort(() => Math.random() - 0.5);
        };

        const vocabQuiz = vocabList.map(v => ({
            id: v.id,
            question: v.hanzi,
            options: generateVocabOptions(v),
            answer: v.uzb
        }));

        const pinyinMap = {
            "也": "yě", "很": "hěn", "还": "hái", "去": "qù", 
            "这": "zhè", "都": "dōu", "太": "tài", "不": "bù", 
            "哪": "nǎ", "的": "de", "在": "zài", "了": "le"
        };
        
        const getPinyin = (hanzi) => {
            const word = vocabList.find(v => v.hanzi === hanzi);
            if (word) return word.pinyin;
            return pinyinMap[hanzi] || hanzi;
        };

        const dialogues = [
            {
                id: 1,
                title: "在李文家 (Li Wenning uyida)",
                turns: [
                    { speaker: "李文", hanzi: "你们爱吃哪个菜？", pinyin: "Nǐmen ài chī nǎge cài?", uzb: "Siz qaysi ovqatni yeyishni yaxshi ko'rasiz?", rus: "Какое блюдо вы любите есть?", eng: "Which dish do you like?" },
                    { speaker: "白家月", hanzi: "我喜欢这个，也喜欢那个。", pinyin: "Wǒ xǐhuan zhège, yě xǐhuan nàge.", uzb: "Menga bunisi yoqadi, unisi ham yoqadi.", rus: "Мне нравится это, и то тоже нравится.", eng: "I like this one, and I also like that one." },
                    { speaker: "陈天中", hanzi: "这些菜都好吃，还很好看。", pinyin: "Zhèxiē cài dōu hǎochī, hái hěn hǎokàn.", uzb: "Bu ovqatlarning hammasi mazali, yana juda chiroyli.", rus: "Все эти блюда вкусные, а еще очень красивые.", eng: "All of these dishes are delicious, and they look great too." },
                    { speaker: "李文", hanzi: "我爱吃中国菜，也喜欢做。大家多吃点儿。", pinyin: "Wǒ ài chī Zhōngguó cài, yě xǐhuan zuò. Dàjiā duō chī diǎnr.", uzb: "Men Xitoy taomlarini yeyishni yaxshi ko'raman, tayyorlashni ham. Hammangiz ko'proq oling.", rus: "Я люблю есть китайскую еду, а также люблю готовить. Угощайтесь побольше.", eng: "I like eating Chinese food, and I also like cooking it. Everyone, eat a bit more." }
                ]
            },
            {
                id: 2,
                title: "讨论假期计划 (Ta'til rejalari haqida suhbat)",
                turns: [
                    { speaker: "李文", hanzi: "你们都想去哪儿？", pinyin: "Nǐmen dōu xiǎng qù nǎr?", uzb: "Hammangiz qayerga borishni xohlaysiz?", rus: "Куда вы все хотите поехать?", eng: "Where do you all want to go?" },
                    { speaker: "安妮", hanzi: "去年我和男朋友去了西安，今年我想去北京。", pinyin: "Qùnián wǒ hé nánpéngyou qùle Xī'ān, jīnnián wǒ xiǎng qù Běijīng.", uzb: "O'tgan yili yigitim bilan Sianga bordik, bu yil esa Pekinga bormoqchiman.", rus: "В прошлом году я с парнем ездила в Сиань, а в этом году хочу поехать в Пекин.", eng: "My boyfriend and I went to Xi'an last year, and I want to visit Beijing this year." },
                    { speaker: "白家月", hanzi: "前几年我去了西安，非常好玩儿。今年我也想去北京。", pinyin: "Qián jǐ nián wǒ qùle Xī'ān, fēicháng hǎowánr. Jīnnián wǒ yě xiǎng qù Běijīng.", uzb: "Bir necha yil oldin Sianga borgan edim, juda qiziqarli. Bu yil men ham Pekinga bormoqchiman.", rus: "Пару лет назад я ездила в Сиань, было очень интересно. В этом году я тоже хочу поехать в Пекин.", eng: "I went to Xi'an a few years ago, and it was really fun. This year, I want to go to Beijing too." },
                    { speaker: "李文", hanzi: "我和王老师都是北京人，北京非常漂亮。", pinyin: "Wǒ hé Wáng lǎoshī dōu shì Běijīng rén, Běijīng fēicháng piàoliang.", uzb: "Men va Vang o'qituvchi pekinlikmiz, Pekin juda chiroyli.", rus: "Мы с учителем Ван из Пекина, Пекин очень красивый.", eng: "Ms. Wang and I are both from Beijing. Beijing is very beautiful." }
                ]
            },
            {
                id: 3,
                title: "去北京旅游的事 (Pekinga sayohat qilish haqida)",
                turns: [
                    { speaker: "王一飞", hanzi: "你们的飞机到北京要几个小时？", pinyin: "Nǐmen de fēijī dào Běijīng yào jǐ gè xiǎoshí?", uzb: "Samolyotingiz Pekingacha necha soat uchadi?", rus: "Сколько часов летит ваш самолет до Пекина?", eng: "How many hours will your flight take to get to Beijing?" },
                    { speaker: "白家月", hanzi: "九个小时。", pinyin: "Jiǔ gè xiǎoshí.", uzb: "To'qqiz soat.", rus: "Девять часов.", eng: "Nine hours." },
                    { speaker: "王一飞", hanzi: "我家人都在北京，星期天我姐姐也有时间，她可以去机场接你们，你们也可以住我家。", pinyin: "Wǒ jiārén dōu zài Běijīng, Xīngqītiān wǒ jiějie yě yǒu shíjiān, tā kěyǐ qù jīchǎng jiē nǐmen, nǐmen yě kěyǐ zhù wǒ jiā.", uzb: "Oila a'zolarim hammasi Pekinda, yakshanba kuni opamning ham bo'sh vaqti bor, u sizni aeroportda kutib olishi mumkin, shuningdek sizlar mening uyimda turishingiz mumkin.", rus: "Моя семья живет в Пекине, в воскресенье у моей сестры тоже есть время, она может встретить вас в аэропорту, вы также можете остановиться у меня.", eng: "My whole family lives in Beijing. My sister will be free on Sunday. She can pick you up at the airport, and you can stay at my home." },
                    { speaker: "安妮", hanzi: "我们星期日早上八点到大兴机场，早不早？", pinyin: "Wǒmen Xīngqīrì zǎoshang bā diǎn dào Dàxīng Jīchǎng, zǎo bu zǎo?", uzb: "Biz yakshanba kuni ertalab soat sakkizda Daxing aeroportiga yetib boramiz, erta emasmi?", rus: "Мы прибываем в аэропорт Дасин в воскресенье утром в восемь часов, это не рано?", eng: "We'll arrive at Daxing Airport at 8:00 on Sunday morning. Is that early?" },
                    { speaker: "王一飞", hanzi: "不早。", pinyin: "Bù zǎo.", uzb: "Erta emas.", rus: "Не рано.", eng: "Not early at all." },
                    { speaker: "白家月", hanzi: "谢谢老师！那我们和您姐姐在大兴机场见！", pinyin: "Xièxie lǎoshī! Nà wǒmen hé nín jiějie zài Dàxīng Jīchǎng jiàn!", uzb: "Rahmat, ustoz! Unda opangiz bilan Daxing aeroportida ko'rishamiz!", rus: "Спасибо, учитель! Тогда увидимся с вашей сестрой в аэропорту Дасин!", eng: "Thank you, teacher! Then we'll meet your sister at Daxing Airport!" }
                ]
            }
        ];

        const grammarQuiz = [
            { q: "我喜欢喝茶，___ 喜欢喝咖啡。", pinyin: "Wǒ xǐhuan hē chá, ___ xǐhuan hē kāfēi.", options: ["也", "很", "早", "接"], a: "也" },
            { q: "昨天我去商店了，___ 去了医院。", pinyin: "Zuótiān wǒ qù shāngdiàn le, ___ qù le yīyuàn.", options: ["还", "那", "几", "要"], a: "还" },
            { q: "这个菜很好吃，那个菜 ___ 很好吃。", pinyin: "Zhège cài hěn hǎochī, nàge cài ___ hěn hǎochī.", options: ["也", "接", "要", "早"], a: "也" },
            { q: "她是老师，我 ___ 是老师。", pinyin: "Tā shì lǎoshī, wǒ ___ shì lǎoshī.", options: ["也", "去", "住", "这"], a: "也" },
            { q: "我们 ___ 是北京人。", pinyin: "Wǒmen ___ shì Běijīng rén.", options: ["都", "还", "接", "爱"], a: "都" },
            { q: "我买了一本书，___ 买了一个本子。", pinyin: "Wǒ mǎi le yī běn shū, ___ mǎi le yī gè běnzi.", options: ["还", "太", "不", "要"], a: "还" },
            { q: "你爱吃 ___ 个菜？", pinyin: "Nǐ ài chī ___ gè cài?", options: ["哪", "那", "这", "的"], a: "哪" },
            { q: "他们 ___ 喜欢去机场。", pinyin: "Tāmen ___ xǐhuan qù jīchǎng.", options: ["都", "还", "在", "早"], a: "都" },
            { q: "昨天很冷，今天 ___ 很冷。", pinyin: "Zuótiān hěn lěng, jīntiān ___ hěn lěng.", options: ["也", "那", "去", "接"], a: "也" },
            { q: "哥哥有时间，姐姐 ___ 有时间。", pinyin: "Gēge yǒu shíjiān, jiějie ___ yǒu shíjiān.", options: ["也", "还", "很", "几"], a: "也" },
            { q: "坐飞机去北京 ___ 几个小时？", pinyin: "Zuò fēijī qù Běijīng ___ jǐ gè xiǎoshí?", options: ["要", "那", "的", "了"], a: "要" },
            { q: "大兴机场很漂亮，___ 很大。", pinyin: "Dàxīng jīchǎng hěn piàoliang, ___ hěn dà.", options: ["也", "还", "接", "早"], a: "也" },
            { q: "他会说汉语，___ 会写汉字。", pinyin: "Tā huì shuō Hànyǔ, ___ huì xiě Hànzì.", options: ["还", "去", "住", "那"], a: "还" },
            { q: "你们 ___ 去我家吧。", pinyin: "Nǐmen ___ qù wǒ jiā ba.", options: ["都", "也", "还", "接"], a: "都" },
            { q: "这个周末我不去，下个周末 ___ 不去。", pinyin: "Zhège zhōumò wǒ bù qù, xià gè zhōumò ___ bù qù.", options: ["也", "太", "很", "早"], a: "也" }
        ];

        const fillBlanksData = [
            { text: ["这本书有15课，我们 ", " 学了。"], pinyin: ["Zhè běn shū yǒu 15 kè, wǒmen ", " xué le."], blank: "都", options: ["爱", "几", "都", "那"] },
            { text: ["我的", " 都爱喝茶。"], pinyin: ["Wǒ de ", " dōu ài hē chá."], blank: "家人", options: ["机场", "家人", "小时", "飞机"] },
            { text: ["陈天中：我们明天晚上六点到，你觉得", " 不 ", "？"], pinyin: ["Chén Tiānzhōng: Wǒmen míngtiān wǎnshang liù diǎn dào, nǐ juéde ", " bù ", "?"], blank: "早", options: ["早", "接", "住", "要"], multiple: true },
            { text: ["她们想坐", " 去北京，你们呢？"], pinyin: ["Tāmen xiǎng zuò ", " qù Běijīng, nǐmen ne?"], blank: "飞机", options: ["时间", "飞机", "机场", "小时"] },
            { text: ["我们没有", " ，不能出去玩。"], pinyin: ["Wǒmen méiyǒu ", " , bù néng chūqù wán."], blank: "时间", options: ["时间", "家人", "年", "早"] },
            { text: ["我喜欢这个，你喜欢", " ？"], pinyin: ["Wǒ xǐhuan zhège, nǐ xǐhuan ", " ?"], blank: "哪个", options: ["那", "哪个", "几", "要"] },
            { text: ["", " 我们去了西安，今年想去北京。"], pinyin: ["", " wǒmen qù le Xī'ān, jīnnián xiǎng qù Běijīng."], blank: "去年", options: ["时间", "去年", "年", "早"] },
            { text: ["安妮和她的", " 一起去中国旅游。"], pinyin: ["Ānnī hé tā de ", " yīqǐ qù Zhōngguó lǚyóu."], blank: "男朋友", options: ["家人", "男朋友", "小时", "飞机"] },
            { text: ["你们在西安玩了", " 天？"], pinyin: ["Nǐmen zài Xī'ān wán le ", " tiān?"], blank: "几", options: ["哪个", "几", "那", "要"] },
            { text: ["那个地方非常", " 。"], pinyin: ["Nàge dìfang fēicháng ", " ."], blank: "好玩儿", options: ["好玩儿", "早", "时间", "接"] },
            { text: ["坐火车去西安", " 十个小时。"], pinyin: ["Zuò huǒchē qù Xī'ān ", " shí gè xiǎoshí."], blank: "要", options: ["要", "爱", "接", "住"] },
            { text: ["我等了三个", " 了。"], pinyin: ["Wǒ děng le sān gè ", " le."], blank: "小时", options: ["年", "小时", "时间", "飞机"] },
            { text: ["星期天我姐姐可以去", " 接你们。"], pinyin: ["Xīngqītiān wǒ jiějie kěyǐ qù ", " jiē nǐmen."], blank: "机场", options: ["机场", "飞机", "时间", "家人"] },
            { text: ["我朋友明天来，我去", " 他。"], pinyin: ["Wǒ péngyou míngtiān lái, wǒ qù ", " tā."], blank: "接", options: ["接", "要", "住", "爱"] },
            { text: ["你们来北京可以", " 我家。"], pinyin: ["Nǐmen lái Běijīng kěyǐ ", " wǒ jiā."], blank: "住", options: ["要", "爱", "住", "接"] },
            { text: ["", " 我们在北京见！"], pinyin: ["", " wǒmen zài Běijīng jiàn!"], blank: "那", options: ["那", "哪个", "几", "这"] }
        ];

        // --- ICONS (Inline SVG) ---
        const VolumeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2.586l4.707 4.707A1 1 0 0016 19.828V4.172a1 1 0 00-1.707-.707L9.586 10H7a2 2 0 00-2 2z" />
            </svg>
        );

        const CheckIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
            </svg>
        );

        const XIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-rose-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
        );

        // --- COMPONENTS ---

        const speakText = (text, e) => {
            if (e) e.stopPropagation();
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        };

        const Flashcard = ({ word }) => {
            const [flipped, setFlipped] = useState(false);

            return (
                <div 
                    className={`flip-card w-full h-48 cursor-pointer rounded-2xl perspective-1000 ${flipped ? 'flipped' : ''}`}
                    onClick={() => setFlipped(!flipped)}
                >
                    <div className="flip-card-inner relative w-full h-full rounded-2xl shadow-lg transition-transform duration-500">
                        {/* Front */}
                        <div className="flip-card-front absolute w-full h-full glass-panel rounded-2xl flex flex-col items-center justify-center p-4">
                            <button 
                                onClick={(e) => speakText(word.hanzi, e)}
                                className="absolute top-3 right-3 p-2 rounded-full hover:bg-white/10 text-slate-300 hover:text-white transition-colors"
                            >
                                <VolumeIcon />
                            </button>
                            <h2 className="text-5xl font-bold text-white mb-2">{word.hanzi}</h2>
                            <p className="text-xl text-indigo-200">{word.pinyin}</p>
                        </div>
                        {/* Back */}
                        <div className="flip-card-back absolute w-full h-full glass-panel rounded-2xl flex flex-col items-center justify-center p-6 text-center">
                            <h3 className="text-xl font-bold text-emerald-300 mb-2">{word.uzb}</h3>
                            <p className="text-md text-blue-200 mb-1">{word.rus}</p>
                            <p className="text-md text-purple-200">{word.eng}</p>
                        </div>
                    </div>
                </div>
            );
        };

        const QuizSection = ({ title, data, isVocab }) => {
            const [answers, setAnswers] = useState({});

            const handleSelect = (idx, option) => {
                setAnswers(prev => ({ ...prev, [idx]: option }));
            };

            const score = Object.keys(answers).filter(k => answers[k] === data[k].a || answers[k] === data[k].answer).length;

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-end border-b border-white/10 pb-4 mb-6">
                        <h2 className="text-2xl font-bold text-white">{title}</h2>
                        <div className="text-lg font-medium text-indigo-300">
                            Natija: {score} / {data.length}
                        </div>
                    </div>
                    
                    <div className="grid md:grid-cols-2 gap-6">
                        {data.map((q, i) => {
                            const isAnswered = answers[i] !== undefined;
                            const isCorrect = isVocab ? answers[i] === q.answer : answers[i] === q.a;
                            const correctAns = isVocab ? q.answer : q.a;
                            
                            return (
                                <div key={i} className={`glass-panel p-6 rounded-2xl border-l-4 ${isAnswered ? (isCorrect ? 'border-l-emerald-500' : 'border-l-rose-500') : 'border-l-indigo-500'}`}>
                                    <h3 className="text-2xl font-semibold mb-2 text-white">
                                        {isVocab && <span className="text-sm font-normal text-slate-300 block mb-1">Ushbu iyeroglif qanday ma'noni anglatadi?</span>}
                                        {q.question || q.q}
                                    </h3>
                                    {q.pinyin && <p className="text-indigo-300 font-mono text-base mb-4 opacity-90">{q.pinyin}</p>}
                                    <div className="grid grid-cols-2 gap-3">
                                        {q.options.map((opt, j) => {
                                            let btnClass = "bg-white/5 hover:bg-white/10 text-slate-200 border border-white/10";
                                            if (isAnswered) {
                                                if (opt === correctAns) btnClass = "bg-emerald-500/20 text-emerald-200 border-emerald-500/50";
                                                else if (opt === answers[i]) btnClass = "bg-rose-500/20 text-rose-200 border-rose-500/50";
                                                else btnClass = "bg-white/5 text-slate-500 border-transparent opacity-50";
                                            }

                                            return (
                                                <button 
                                                    key={j} 
                                                    onClick={() => !isAnswered && handleSelect(i, opt)}
                                                    disabled={isAnswered}
                                                    className={`py-3 px-4 rounded-xl text-sm font-medium transition-all text-left flex justify-between items-center ${btnClass}`}
                                                >
                                                    <span className="flex items-center gap-2">
                                                        <span>{opt}</span>
                                                        {!isVocab && <span className="text-xs opacity-60 font-mono">({getPinyin(opt)})</span>}
                                                    </span>
                                                    {isAnswered && opt === answers[i] && (isCorrect ? <CheckIcon/> : <XIcon/>)}
                                                </button>
                                            )
                                        })}
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            );
        };

        const DialoguesSection = () => {
            return (
                <div className="space-y-12">
                    {dialogues.map(dialogue => (
                        <div key={dialogue.id} className="glass-panel p-6 md:p-8 rounded-3xl">
                            <h2 className="text-2xl font-bold text-indigo-300 mb-6 pb-4 border-b border-white/10">{dialogue.title}</h2>
                            <div className="space-y-6">
                                {dialogue.turns.map((turn, i) => (
                                    <div key={i} className="flex flex-col md:flex-row gap-4 bg-white/5 p-4 rounded-2xl hover:bg-white/10 transition-colors">
                                        <div className="md:w-32 flex-shrink-0 font-semibold text-indigo-400">
                                            {turn.speaker}
                                        </div>
                                        <div className="flex-grow space-y-2">
                                            <div className="flex items-start gap-3">
                                                <div className="flex-grow">
                                                    <p className="text-2xl text-white font-medium mb-1">{turn.hanzi}</p>
                                                    <p className="text-indigo-200 font-mono text-sm mb-3">{turn.pinyin}</p>
                                                </div>
                                                <button 
                                                    onClick={() => speakText(turn.hanzi)}
                                                    className="p-2 bg-indigo-500/20 hover:bg-indigo-500/40 text-indigo-300 rounded-full transition-colors flex-shrink-0"
                                                >
                                                    <VolumeIcon />
                                                </button>
                                            </div>
                                            <div className="space-y-1 text-sm border-t border-white/10 pt-2">
                                                <p><span className="text-slate-400 font-medium mr-2">Uzb:</span> <span className="text-slate-200">{turn.uzb}</span></p>
                                                <p><span className="text-slate-400 font-medium mr-2">Rus:</span> <span className="text-slate-200">{turn.rus}</span></p>
                                                <p><span className="text-slate-400 font-medium mr-2">Eng:</span> <span className="text-slate-200">{turn.eng}</span></p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const GrammarSection = () => {
            return (
                <div className="glass-panel p-6 md:p-8 rounded-3xl space-y-8">
                    <div>
                        <h2 className="text-3xl font-bold text-white mb-6">并列复句 "..., 还/也..."</h2>
                        
                        <div className="grid md:grid-cols-3 gap-6 mb-8">
                            <div className="bg-white/5 p-4 rounded-2xl border-l-2 border-indigo-400">
                                <h3 className="text-indigo-300 font-semibold mb-2">O'zbek tili</h3>
                                <p className="text-sm text-slate-300 leading-relaxed">
                                    Qo'shma gaplar "...，还/也..." ikki yoki undan ortiq mantiqiy bog'langan va tuzilishi simmetrik bo'lgan gaplardan iborat. Bu "shuningdek", "yana", "ham" kabi ma'nolarni ifodalaydi.
                                </p>
                            </div>
                            <div className="bg-white/5 p-4 rounded-2xl border-l-2 border-purple-400">
                                <h3 className="text-purple-300 font-semibold mb-2">Русский</h3>
                                <p className="text-sm text-slate-300 leading-relaxed">
                                    Сложносочиненные предложения "...，还/也..." состоят из двух или более логически связанных и структурно симметричных предложений. Означает "также", "еще".
                                </p>
                            </div>
                            <div className="bg-white/5 p-4 rounded-2xl border-l-2 border-pink-400">
                                <h3 className="text-pink-300 font-semibold mb-2">English</h3>
                                <p className="text-sm text-slate-300 leading-relaxed">
                                    The coordinate compound sentence "...，还/也..." consists of two or more logically related and structurally parallel clauses. Used to indicate "also", "in addition".
                                </p>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h3 className="text-xl font-bold text-indigo-200 mb-4 border-b border-white/10 pb-2">Misollar / Examples</h3>
                        <div className="space-y-4">
                            <div className="bg-white/5 p-5 rounded-2xl hover:bg-white/10 transition flex justify-between items-center group">
                                <div>
                                    <p className="text-2xl text-white mb-1">我喜欢这个，<span className="text-pink-400">也</span>喜欢那个。</p>
                                    <p className="text-indigo-200 font-mono text-sm mb-2">Wǒ xǐhuan zhège, <span className="text-pink-300">yě</span> xǐhuan nàge.</p>
                                    <p className="text-slate-300 text-sm">Menga bunisi yoqadi, unisi <span className="text-emerald-300 font-semibold">ham</span> yoqadi.</p>
                                </div>
                                <button onClick={() => speakText("我喜欢这个，也喜欢那个。")} className="p-3 text-indigo-400 hover:text-white bg-indigo-500/20 rounded-full opacity-0 group-hover:opacity-100 transition-all">
                                    <VolumeIcon />
                                </button>
                            </div>
                            
                            <div className="bg-white/5 p-5 rounded-2xl hover:bg-white/10 transition flex justify-between items-center group">
                                <div>
                                    <p className="text-2xl text-white mb-1">王老师是北京人，李文<span className="text-pink-400">也</span>是北京人。</p>
                                    <p className="text-indigo-200 font-mono text-sm mb-2">Wáng lǎoshī shì Běijīng rén, Lǐ Wén <span className="text-pink-300">yě</span> shì Běijīng rén.</p>
                                    <p className="text-slate-300 text-sm">O'qituvchi Vang pekinlik, Li Ven <span className="text-emerald-300 font-semibold">ham</span> pekinlik.</p>
                                </div>
                                <button onClick={() => speakText("王老师是北京人，李文也是北京人。")} className="p-3 text-indigo-400 hover:text-white bg-indigo-500/20 rounded-full opacity-0 group-hover:opacity-100 transition-all">
                                    <VolumeIcon />
                                </button>
                            </div>

                            <div className="bg-white/5 p-5 rounded-2xl hover:bg-white/10 transition flex justify-between items-center group">
                                <div>
                                    <p className="text-2xl text-white mb-1">我喜欢喝中国茶，<span className="text-pink-400">还</span>喜欢吃中国菜。</p>
                                    <p className="text-indigo-200 font-mono text-sm mb-2">Wǒ xǐhuan hē Zhōngguó chá, <span className="text-pink-300">hái</span> xǐhuan chī Zhōngguó cài.</p>
                                    <p className="text-slate-300 text-sm">Men xitoy choyini ichishni yaxshi ko'raman, <span className="text-emerald-300 font-semibold">shuningdek</span> xitoy taomlarini yeyishni ham yaxshi ko'raman.</p>
                                </div>
                                <button onClick={() => speakText("我喜欢喝中国茶，还喜欢吃中国菜。")} className="p-3 text-indigo-400 hover:text-white bg-indigo-500/20 rounded-full opacity-0 group-hover:opacity-100 transition-all">
                                    <VolumeIcon />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const FillBlanksSection = () => {
            const [answers, setAnswers] = useState({});

            const handleSelect = (idx, value, blankIndex = 0) => {
                const key = `${idx}-${blankIndex}`;
                setAnswers(prev => ({
                    ...prev,
                    [key]: value
                }));
            };

            return (
                <div className="glass-panel p-6 md:p-8 rounded-3xl">
                    <h2 className="text-2xl font-bold text-white mb-6 border-b border-white/10 pb-4">So'zlarni to'ldirish (Fill in the blanks)</h2>
                    <div className="space-y-6">
                        {fillBlanksData.map((item, i) => {
                            const isMultiple = item.multiple;
                            // 提取 key，避免直接在 JSX className 中使用嵌套的模板字符串以防止编译解析错误
                            const key0 = `${i}-0`;
                            const key1 = `${i}-1`;
                            
                            const selectClass0 = `bg-indigo-900/80 border ${answers[key0] === item.blank ? 'border-emerald-500 text-emerald-300' : 'border-white/20 text-indigo-200'} rounded-lg px-3 py-1 outline-none text-center cursor-pointer appearance-none min-w-[80px]`;
                            const selectClass1 = `bg-indigo-900/80 border ${answers[key1] === item.blank ? 'border-emerald-500 text-emerald-300' : 'border-white/20 text-indigo-200'} rounded-lg px-3 py-1 outline-none text-center cursor-pointer appearance-none min-w-[80px]`;

                            return (
                                <div key={i} className="flex flex-col gap-2 bg-white/5 p-4 rounded-xl text-white">
                                    <div className="flex flex-wrap items-center gap-3 text-xl">
                                        <span>{i + 1}. </span>
                                        <span>{item.text[0]}</span>
                                        
                                        <select 
                                            className={selectClass0}
                                            value={answers[key0] || ""}
                                            onChange={(e) => handleSelect(i, e.target.value, 0)}
                                        >
                                            <option value="" disabled>-</option>
                                            {item.options.map((opt, j) => (
                                                <option key={j} value={opt}>{opt} ({getPinyin(opt)})</option>
                                            ))}
                                        </select>
                                        
                                        <span>{item.text[1]}</span>

                                        {isMultiple && (
                                            <>
                                                <select 
                                                    className={selectClass1}
                                                    value={answers[key1] || ""}
                                                    onChange={(e) => handleSelect(i, e.target.value, 1)}
                                                >
                                                    <option value="" disabled>-</option>
                                                    {item.options.map((opt, j) => (
                                                        <option key={j} value={opt}>{opt} ({getPinyin(opt)})</option>
                                                    ))}
                                                </select>
                                                <span>{item.text[2]}</span>
                                            </>
                                        )}
                                        
                                        {/* Feedback Icons */}
                                        <div className="ml-auto flex-shrink-0">
                                            {answers[key0] && (answers[key0] === item.blank ? <CheckIcon/> : <XIcon/>)}
                                        </div>
                                    </div>
                                    {item.pinyin && (
                                        <div className="flex flex-wrap items-center gap-2 text-base text-indigo-300 font-mono md:ml-6 mt-1 opacity-90">
                                            <span>{item.pinyin[0]}</span>
                                            <span className="min-w-[80px] border-b border-indigo-300/50 text-center inline-block text-indigo-200 px-2 pb-0.5">
                                                {answers[key0] ? getPinyin(answers[key0]) : '___'}
                                            </span>
                                            <span>{item.pinyin[1]}</span>
                                            {isMultiple && (
                                                <>
                                                    <span className="min-w-[80px] border-b border-indigo-300/50 text-center inline-block text-indigo-200 px-2 pb-0.5">
                                                        {answers[key1] ? getPinyin(answers[key1]) : '___'}
                                                    </span>
                                                    <span>{item.pinyin[2]}</span>
                                                </>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )
                        })}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('flashcards');

            const tabs = [
                { id: 'flashcards', label: "Lug'at" },
                { id: 'vocab-test', label: "Lug'at testi" },
                { id: 'dialogue', label: "Muloqot" },
                { id: 'grammar', label: "Grammatika" },
                { id: 'grammar-test', label: "Grammatika testi" },
                { id: 'fill-blanks', label: "So'zlarni to'ldirish" }
            ];

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <header className="pt-12 pb-8 px-6 text-center">
                        <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 via-teal-300 to-cyan-300 mb-4 tracking-tight">
                            大兴机场见! (Dàxīng Jīchǎng jiàn!)
                        </h1>
                        <p className="text-xl text-indigo-200 font-medium bg-white/5 inline-block px-6 py-2 rounded-full border border-white/10 shadow-xl">
                            Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
                        </p>
                    </header>

                    {/* Navigation */}
                    <nav className="max-w-6xl mx-auto px-4 mb-8">
                        <div className="flex flex-wrap justify-center gap-2 md:gap-4 p-2 glass-panel rounded-3xl">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`px-5 py-2.5 rounded-2xl text-sm md:text-base font-medium transition-all duration-300 ${
                                        activeTab === tab.id 
                                        ? 'bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow-lg shadow-purple-500/25' 
                                        : 'text-slate-300 hover:text-white hover:bg-white/10'
                                    }`}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="max-w-6xl mx-auto px-4">
                        <div className="animate-in fade-in slide-in-from-bottom-4 duration-700">
                            {activeTab === 'flashcards' && (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {vocabList.map(word => <Flashcard key={word.id} word={word} />)}
                                </div>
                            )}
                            {activeTab === 'vocab-test' && <QuizSection title="Lug'at testi" data={vocabQuiz} isVocab={true} />}
                            {activeTab === 'dialogue' && <DialoguesSection />}
                            {activeTab === 'grammar' && <GrammarSection />}
                            {activeTab === 'grammar-test' && <QuizSection title="Grammatika testi" data={grammarQuiz} isVocab={false} />}
                            {activeTab === 'fill-blanks' && <FillBlanksSection />}
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="fixed bottom-0 w-full glass-panel py-4 text-center z-50">
                        <p className="text-slate-400 text-sm font-medium">
                            HSK 1 NEW3.0 - Lesson 15 <br className="md:hidden"/> 
                            <span className="hidden md:inline"> | </span> 
                            © 2026 Dilfuza Kāng lǎo shī (telegram@diffila)
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
